name: Update files

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Update files
        uses: MathieuSoysal/file-updater-for-release@v1.0.3
        with:
          files: docs/DOCUMENTATION.md # List of files to update
          prefix: "file-updater-for-release@" # Prefix before the version, default is: ""

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          #token: ${{ secrets.GITHUB_TOKEN }} # You need to create your own token with pull request rights
          commit-message: update version in Docs
          title: Update RoadmapAndIssues
          body: Update RoadmapAndIssues to reflect release changes
          branch: update-roadmapandissues
          base: main
