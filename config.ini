# ObradexEngine configuration
# Edit and restart to apply changes.

[window]
width      = 1280
height     = 720
fullscreen = false
vsync      = true

[render]
# Internal low-res buffer. 320x180 = 4:1 pixel ratio at 1280x720.
# Increase for a crisper image; decrease for more dither coverage.
width  = 320
height = 180
fps    = 60

[player]
sensitivity = 0.12

[audio]
master_volume = 1.0
